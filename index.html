<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense & Budget Visualizer</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <h1>Expense & Budget Visualizer</h1>
        <div class="balance-card">
            <h2>TOTAL BALANCE</h2>
            <div id="total-balance" class="balance-amount">$0.00</div>
        </div>
        <div class="main-content">
            <div class="card">
                <h3>Add Transaction</h3>
                <form id="transaction-form">
                    <div class="form-group">
                        <label for="item-name">Item Name</label>
                        <input type="text" id="item-name" placeholder="e.g., Cilok" required>
                    </div>
                    <div class="form-group">
                        <label for="amount">Amount</label>
                        <input type="number" id="amount" step="0.01" placeholder="e.g., 14.94" required>
                    </div>
                    <div class="form-group">
                        <label for="category">Category</label>
                        <select id="category" required>
                            <option value="">-- Select Category --</option>
                            <option value="Food">Food</option>
                            <option value="Transport">Transport</option>
                            <option value="Fun">Fun</option>
                        </select>
                    </div>
                    <button type="submit" class="btn-submit">Add Transaction</button>
                </form>
            </div>
            <div class="display-grid">
                <div class="card">
                    <h3>Transactions</h3>
                    <div class="list-container">
                        <ul id="transaction-list"></ul>
                    </div>
                </div>
                <div class="card">
                    <h3>Spending by Category</h3>
                    <div class="chart-container">
                        <canvas id="spending-chart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
